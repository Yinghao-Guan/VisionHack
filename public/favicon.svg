<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      text { font-family: 'Inter', sans-serif; font-weight: 700; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" fill="#ffffff"/>
  <!-- Main shape/content area -->
  <rect x="10" y="10" width="80" height="80" rx="8" fill="#000000"/>
  <!-- Accent elements -->
  <rect x="20" y="20" width="25" height="25" rx="4" fill="#E8734A"/>
  <rect x="55" y="20" width="25" height="25" rx="4" fill="#D45A8E"/>
  <rect x="20" y="55" width="25" height="25" rx="4" fill="#7B5EA7"/>
  <rect x="55" y="55" width="25" height="25" rx="4" fill="#E8734A"/>
  <!-- Centered text -->
  <text x="50" y="65" text-anchor="middle" fill="white" font-size="32">S</text>
</svg>